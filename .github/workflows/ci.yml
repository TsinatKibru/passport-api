name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: passport_user
          POSTGRES_PASSWORD: passport_pass
          POSTGRES_DB: passport_track_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://passport_user:passport_pass@localhost:5432/passport_track_test
      JWT_SECRET: ci-test-secret-not-used-in-production
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: passport-track-api/package-lock.json

      - name: Install dependencies
        working-directory: passport-track-api
        run: npm ci

      - name: Generate Prisma client
        working-directory: passport-track-api
        run: npx prisma generate

      - name: Run database migrations
        working-directory: passport-track-api
        run: npx prisma migrate deploy

      - name: Run unit tests
        working-directory: passport-track-api
        run: npm run test -- --testPathPattern="location.service"

      - name: Run E2E tests
        working-directory: passport-track-api
        run: npm run test:e2e
